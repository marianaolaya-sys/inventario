<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="inventarioestilo.css">
  <title>Inventario Interactivo</title>
  <!--tipografia-->
  
</head>

<body>
  <h1>Sistema de Inventario</h1>

  <section class="card">
    <h3>PRODUCTOS</h3>
      <section class="form-grid">
    
    <label for="nombre">Nombre:</label>
    <select id="nombre">
        <option value="arros">arros</option>
        <option value="cuaderno">cuaderno</option>
        <option value="jabon">jabon</option>
        <option value="lapiz">lapiz</option>
        <option value="moñas">moñas</option>
        <option value="peine">peine</option>
        <option value="medias">medias</option>
        <option value="termo">termo</option>
        <option value="plato">plato</option>
        <option value="gorras">gorras</option>
        <option value="reglo">reglo</option>
        <option value="termo">termo</option>
        <option value="brochas">brochas</option>
        <option value="labial">labial</option>
        <option value="encrespador">encrespador</option>
        <option value="sombras">sombras</option>
        <option value="tijeras">tijeras</option>
        <option value="cuchara">cuchara</option>
        <option value="cuchillo">cuchillo</option>
        <option value="espejo">espejo</option>
        <option value="esmalte">esmalte</option>
    </select>

    <div class="producto-preview">
        <img id="previewProducto" src="none.png" alt="Producto">
        <button id="btnAgregar" class="btn-form">Agregar</button>
    </div>

    <label for="cantidad">Cantidad:</label>
    <input type="number" id="cantidad" />

    <label for="precio">Precio unitario:</label>
    <input type="number" id="precio" />

</section>
  </section>

  <section class="card">
    <h3>Inventario</h3>

    <table id="tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Total</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <section class="total" id="totalGeneral">Total general: $0</section>
  </section>

  <script src="inventario.js" defer></script>
</body>

</html>
